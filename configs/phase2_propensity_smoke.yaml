stage: phase2
slice: teacher_forced_propensity_smoke
seed: 1729

wandb:
  enabled: true
  project: slop-stage1
  group: phase2-propensity
  api_key_env: WANDB_API_KEY
  log_raw_text: false
  tags:
    - stage2
    - phase2
    - teacher_forced
    - smoke

inputs:
  primary_reference: artifacts/stage1/corpora/olmo3_dolci_sft_10k_retained_sample.jsonl
  prompt_package: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8.jsonl
  prompt_package_manifest: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8_manifest.csv
  smoke_sample_size: 8
  smoke_max_opportunities: 128
  smoke_features:
    - contrastive_negation
    - slop_lexicon
    - stock_openers
    - stock_closers
  neutral_control_features:
    - neutral_for_example
    - neutral_such_as
    - neutral_in_particular
    - neutral_as_a_result
    - neutral_controls
  neutral_common_control_features:
    - neutral_common_the
    - neutral_common_a
    - neutral_common_of_the
    - neutral_common_number_of
    - neutral_common_in_the
    - neutral_common_to_the
    - neutral_common_is_a
    - neutral_common_controls

models:
  smoke_model: sshleifer/tiny-gpt2
  primary_ladder:
    - allenai/Olmo-3-1025-7B
    - allenai/Olmo-3-7B-Instruct-SFT
    - allenai/Olmo-3-7B-Instruct-DPO
    - allenai/Olmo-3-7B-Instruct

teacher_forced:
  probability_mass: exact_sequence_first_1_to_3_tokens
  max_prefix_tokens: 1024
  fixed_prefix_tokens: 256
  opportunity_batch_size: 16
  sequence_cache: true
  cache_branch_batch_size: 2
  shared_prefix_multi_feature_cache: true
  normalization_feature_for_current_contract: neutral_common_controls
  max_token_start_opportunities: 128
  torch_compile_default: true
  first_token_mass_status: debug_fallback
  notes:
    - Exact sequence mass is the default Phase 2 propensity estimator.
    - First-token mass remains available only as a debugging fallback.
    - Keep Biber-lite as register covariates, not propensity targets.
    - Neutral controls are calibration targets, not slop features.
    - Score multiple features sharing the same prefix in one cached prefix pass.
    - Initiator sequence enumeration includes sentence-case variants because
      reference matchers are case-insensitive.
    - The common neutral basket is separate from the discourse-marker neutral
      basket and has higher reference support in the 512-row prompt package.
    - Use --normalization-feature neutral_common_controls for current
      token-start Phase 2 shards so raw AF and neutral-normalized AF are both
      reported.

