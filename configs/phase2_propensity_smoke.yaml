stage: phase2
slice: teacher_forced_propensity_smoke
seed: 1729

wandb:
  enabled: true
  project: slop-stage1
  group: phase2-propensity
  api_key_env: WANDB_API_KEY
  log_raw_text: false
  tags:
    - stage2
    - phase2
    - teacher_forced
    - smoke

inputs:
  primary_reference: artifacts/stage1/corpora/olmo3_dolci_sft_10k_retained_sample.jsonl
  prompt_package: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8.jsonl
  prompt_package_manifest: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8_manifest.csv
  smoke_sample_size: 8
  smoke_max_opportunities: 128
  smoke_features:
    - contrastive_negation
    - slop_lexicon
    - stock_openers
    - stock_closers
  neutral_control_features:
    - neutral_for_example
    - neutral_such_as
    - neutral_in_particular
    - neutral_as_a_result
    - neutral_controls

models:
  smoke_model: sshleifer/tiny-gpt2
  primary_ladder:
    - allenai/Olmo-3-1025-7B
    - allenai/Olmo-3-7B-Instruct-SFT
    - allenai/Olmo-3-7B-Instruct-DPO
    - allenai/Olmo-3-7B-Instruct

teacher_forced:
  probability_mass: exact_sequence_first_1_to_3_tokens
  max_prefix_tokens: 1024
  fixed_prefix_tokens: 256
  max_token_start_opportunities: 128
  torch_compile_default: true
  first_token_mass_status: debug_fallback
  notes:
    - Exact sequence mass is the default Phase 2 propensity estimator.
    - First-token mass remains available only as a debugging fallback.
    - Keep Biber-lite as register covariates, not propensity targets.
    - Neutral controls are calibration targets, not slop features.

prompt_package:
  source: allenai/Dolci-Instruct-SFT-7B
  split: train
  sample_size: 8
  max_scan: 128
  sampling_strategy: hash_reservoir
  near_duplicate_threshold: 0.85
  minhash_size: 64
  minhash_shingle_tokens: 5
  minhash_band_size: 4
  wandb_run_id: 7xkqxesu
  result:
    scanned_rows: 128
    eligible_prompts: 125
    near_duplicate_prompt: 3
    selected_prompts: 8

first_real_run:
  model: allenai/Olmo-3-7B-Instruct-SFT
  input: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8.jsonl
  sample_size: 8
  features:
    - contrastive_negation
    - slop_lexicon
    - stock_openers
    - stock_closers
  max_opportunities: 48
  max_token_start_opportunities: 16
  fixed_prefix_tokens: 256
  max_prefix_tokens: 256
  dtype: bfloat16
  wandb_run_id: mbsjovsf
  result:
    docs: 8
    opportunities: 227
    wall_seconds: 376.79138
    opportunities_per_sec: 0.60246
    reference_initiations: 0
  caveat: prompt-package-backed shard with zero reference initiations; validates plumbing and throughput only

free_running_smoke:
  model: sshleifer/tiny-gpt2
  input: artifacts/stage1/corpora/olmo3_dolci_sft_10k_retained_sample.jsonl
  fallback_text_as_prompt: true
  sample_size: 1
  features:
    - slop_lexicon
    - stock_openers
  temperature: 0.0
  max_new_tokens: 16
  wandb_run_id: 4dt5kc3h
  caveat: uses retained text as prompt only for plumbing validation

go_no_go:
  promote_to_olmo_tiny_shard_if:
    - smoke_cli_runs_on_cuda
    - wandb_logs_no_raw_text
    - opportunity_counts_are_nonzero
    - torch_compile_does_not_fail
  no_go_if:
    - tokenizer_empty_prefix_has_no_bos_eos_or_pad_fallback
    - peak_gpu_memory_exceeds_available_headroom
    - opportunities_per_sec_too_low_for_projected_full_grid
