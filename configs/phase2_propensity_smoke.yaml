runtime_backends:
  teacher_forced_propensity:
    current_backend: torch_transformers
    status: keep
    reason: exact AF scorer needs arbitrary candidate continuation mass at fixed corpus offsets
  free_running_generation:
    candidate_backends:
      - vllm
      - sglang
    status: benchmark_before_full_free_running_grid
    reason: serving backends are better aligned with batched autoregressive generation than with the current exact teacher-forced estimator

