stage: phase2
slice: teacher_forced_propensity_smoke
seed: 1729

wandb:
  enabled: true
  project: slop-stage1
  group: phase2-propensity
  api_key_env: WANDB_API_KEY
  log_raw_text: false
  tags:
    - stage2
    - phase2
    - teacher_forced
    - smoke

inputs:
  primary_reference: artifacts/stage1/corpora/olmo3_dolci_sft_10k_retained_sample.jsonl
  prompt_package: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8.jsonl
  prompt_package_manifest: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8_manifest.csv
  smoke_sample_size: 8
  smoke_max_opportunities: 128
  smoke_features:
    - contrastive_negation
    - slop_lexicon
    - stock_openers
    - stock_closers
  neutral_control_features:
    - neutral_for_example
    - neutral_such_as
    - neutral_in_particular
    - neutral_as_a_result
    - neutral_controls

models:
  smoke_model: sshleifer/tiny-gpt2
  primary_ladder:
    - allenai/Olmo-3-1025-7B
    - allenai/Olmo-3-7B-Instruct-SFT
    - allenai/Olmo-3-7B-Instruct-DPO
    - allenai/Olmo-3-7B-Instruct

teacher_forced:
  probability_mass: exact_sequence_first_1_to_3_tokens
  max_prefix_tokens: 1024
  fixed_prefix_tokens: 256
  opportunity_batch_size: 16
  sequence_cache: true
  cache_branch_batch_size: 2
  shared_prefix_multi_feature_cache: true
  max_token_start_opportunities: 128
  torch_compile_default: true
  first_token_mass_status: debug_fallback
  notes:
    - Exact sequence mass is the default Phase 2 propensity estimator.
    - First-token mass remains available only as a debugging fallback.
    - Keep Biber-lite as register covariates, not propensity targets.
    - Neutral controls are calibration targets, not slop features.
    - Score multiple features sharing the same prefix in one cached prefix pass.

prompt_package:
  source: allenai/Dolci-Instruct-SFT-7B
  split: train
  sample_size: 8
  max_scan: 128
  sampling_strategy: hash_reservoir
  near_duplicate_threshold: 0.85
  minhash_size: 64
  minhash_shingle_tokens: 5
  minhash_band_size: 4
  wandb_run_id: 7xkqxesu
  result:
    scanned_rows: 128
    eligible_prompts: 125
    near_duplicate_prompt: 3
    selected_prompts: 8

positive_control_package:
  source: allenai/Dolci-Instruct-SFT-7B
  split: train
  sample_size: 32
  max_scan: 4096
  require_reference_feature:
    - slop_lexicon
    - neutral_controls
  reference_feature_max_token_start_opportunities: 256
  sampling_strategy: hash_reservoir
  near_duplicate_threshold: 0.85
  wandb_run_id: wl0o62kn
  result:
    scanned_rows: 4096
    eligible_prompts: 347
    near_duplicate_prompt: 0
    selected_prompts: 32
    first_4_rows_opportunities_cap128: 902
    first_4_rows_reference_positives:
      slop_lexicon: 2
      neutral_controls: 2
      stock_openers: 1

first_real_run:
  model: allenai/Olmo-3-7B-Instruct-SFT
  input: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_prompt_package_8.jsonl
  sample_size: 8
  features:
    - contrastive_negation
    - slop_lexicon
    - stock_openers
    - stock_closers
  max_opportunities: 48
  max_token_start_opportunities: 16
  fixed_prefix_tokens: 256
  max_prefix_tokens: 256
  dtype: bfloat16
  wandb_run_id: mbsjovsf
  result:
    docs: 8
    opportunities: 227
    wall_seconds: 376.79138
    opportunities_per_sec: 0.60246
    reference_initiations: 0
  caveat: prompt-package-backed shard with zero reference initiations; validates plumbing and throughput only

first_bounded_af_run:
  model: allenai/Olmo-3-7B-Instruct-SFT
  input: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_positive_control_package_32.jsonl
  sample_size: 4
  features:
    - slop_lexicon
    - neutral_controls
    - stock_openers
  max_opportunities: 512
  max_token_start_opportunities: 128
  fixed_prefix_tokens: 256
  max_prefix_tokens: 256
  opportunity_batch_size: 16
  sequence_cache: true
  cache_branch_batch_size: 2
  dtype: bfloat16
  wandb_run_id: bigtxtoj
  result:
    docs: 4
    opportunities: 902
    wall_seconds: 92.26881
    opportunities_per_sec: 9.77578
    reference_initiations:
      neutral_controls: 2
      slop_lexicon: 2
      stock_openers: 1
    amplification_factor:
      neutral_controls: 0.2960318154197239
      slop_lexicon: 0.43403744228180585
      stock_openers: 0.0003604888916015625
  caveat: targeted reference-positive shard for plumbing and calibration; not an unbiased corpus AF estimate

optimization_benchmarks:
  cpu_opportunity_extraction:
    input: artifacts/phase2/prompts/olmo3_dolci_sft_phase2_positive_control_package_32.jsonl
    wandb_run_id: 4gy3euvz
    measurement_rows: 32
    opportunities: 8774
    fastest_full_opportunities_per_sec: 142813.55331
    fastest_offsets_only_opportunities_per_sec: 1043325.22763
    conclusion: cpu_extraction_not_bottleneck
  olmo3_sft_shared_prefix_cache:
    model: allenai/Olmo-3-7B-Instruct-SFT
    wandb_run_id: a2lcsbg9
    prefix_tokens: 256
    batch_size: 16
    cache_branch_batch_size: 2
    features_scored:
      - slop_lexicon
      - neutral_controls
      - stock_openers
    scalar_opportunities_per_sec: 2.72520
    batched_replay_opportunities_per_sec: 3.16253
    single_feature_cached_opportunities_per_sec: 24.88784
    shared_multi_feature_cached_feature_opportunities_per_sec: 53.23785
    shared_multi_feature_cached_prefixes_per_sec: 17.74595
    max_abs_diff_vs_scalar: 0.00018310546875
    conclusion: use_shared_prefix_cache_for_multi_feature_shards

free_running_smoke:
  model: sshleifer/tiny-gpt2
  input: artifacts/stage1/corpora/olmo3_dolci_sft_10k_retained_sample.jsonl
  fallback_text_as_prompt: true
  sample_size: 1
  features:
    - slop_lexicon
    - stock_openers
  temperature: 0.0
  max_new_tokens: 16
  wandb_run_id: 4dt5kc3h
  caveat: uses retained text as prompt only for plumbing validation

go_no_go:
  promote_to_olmo_tiny_shard_if:
    - smoke_cli_runs_on_cuda
    - wandb_logs_no_raw_text
    - opportunity_counts_are_nonzero
    - torch_compile_does_not_fail
  no_go_if:
    - tokenizer_empty_prefix_has_no_bos_eos_or_pad_fallback
    - peak_gpu_memory_exceeds_available_headroom
    - opportunities_per_sec_too_low_for_projected_full_grid
